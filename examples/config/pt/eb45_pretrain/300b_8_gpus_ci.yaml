# stage
stage: ernie_pretrain

# data
dataset_type: pretrain
input_dir: "0.4 ./demo_data/data-1-part0 0.6 ./demo_data/data-1-part0"
split: "998,1,1"
max_seq_len: 4096
dataloader_num_workers: 8
prefetch_factor: 32
ignore_data_skip: 0

# model
model_name_or_path: model_configs/ERNIE-4.5-300B-A47B/
tokenizer_name_or_path: examples/experiments/ernie_pretrain/ernie/src/tokenizers/tokenizer_model
moe_router_bias_update_rate: 0.001
moe_with_send_router_loss: False
moe_group: ep
use_moe: true

# train
output_dir: ./output/
num_consecutive: 32
global_logging_interval: 10
enable_mtp_magic_send: True
moe_gate_lr_ratio: 0.01
do_train: True
overwrite_output_dir: 1
disable_tqdm: 1
logging_steps: 1
eval_steps: 1000
eval_iters: -1
save_steps: 100
max_steps: 100
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-8
learning_rate: 2.2e-4
min_lr: 2.2e-5
gradient_accumulation_steps: 2
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
lr_scheduler: wsd:231084
decay_function: 1-sqrt
max_grad_norm: 1.0
use_async_save: True
weight_decay: 0.1
warmup_steps: 200
save_total_limit: 5
bf16: True
fp16_opt_level: "O2"
use_fp8: False
scale_loss: 4096
seed: 666
tensorwise_offload_optimizer: True
pipeline_model_parallel_size: 2
tensor_model_parallel_size: 1
virtual_pipeline_model_parallel_size: 1
use_expert_parallel: True
expert_model_parallel_size: 4
sharding: "stage1"
sharding_parallel_size: 4
amp_master_grad: 1

# pipeline_parallel_config
overlap_p2p_comm: true
best_unbalanced_scheduler: true

# sharding_parallel_config
split_param: true
sharding_comm_buffer_size_MB: 2048

# tensor_parallel_config
tp_sync_param: true
sync_grad: true
tp_sync_moment: true
hybrid_parallel_topo_order: sharding_first
skip_profile_timer: True
shuffle_consecutive: True
load_sharded_model: True
save_sharded_model: True
ignore_load_lr_and_optim: False
metrics_output_path: ./output/paddle_distributed_logs/
log_global_grad_norm: True
gc_interval: 100000

# ernie_model_config
ernie_model_config:
    num_hidden_layers: 6
    moe_num_experts: 8
    moe_k: 4
    moe_capacity: [4,4,4]

    num_nextn_predict_layers: 1
    use_ep_comm_overlap: false
    use_combine_before_a2a: true
    use_quant_before_a2a: true
    use_async_a2a: false
    use_rms_qkv_recompute: true
    moe_logging: True
    moe_use_aux_free: true
    use_recompute: false
    use_fp8_mlp: true
    use_fp8_fuse_node: true
    fp8_mem_configs:
        shared_expert: false
        recompute_fwd_gate_up: [6, 7, 8, 11, 12, 13, 16, 17, 18]
        dequant_input: true
        offline_quant_expert_weight: true
        clear_origin_weight_when_offline_quant: true
    fp8_fused_ops_configs:
        stack_quant: true
        swiglu_probs_bwd: true
        split_group_gemm: false
        spaq: true
    transpose_split_quant: true
    moe_gate: top2_fused
