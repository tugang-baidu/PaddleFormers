### data
train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: ./tests/fixtures/dummy/dpo-vl/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./tests/fixtures/dummy/dpo-vl/eval.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 8192
packing: false
mix_strategy: concat
template_backend: custom
template: qwen2_vl

### model
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
_attn_implementation: flashmask

### finetuning
# base
stage: VL-DPO
fine_tuning: full
seed: 23
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: -1
eval_steps: 100
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 4
logging_dir: ./vdl_log
output_dir: ./checkpoints/qwen2.5-vl-dpo-full-fsdp
disable_tqdm: true
eval_accumulation_steps: 16

# train
warmup_steps: 20
learning_rate: 1.0e-6
loss_type: sigmoid  # choices: [sigmoid (dpo), hinge, simpo, ipo, dpop, kto_pair, sppo_hard, nca_pair, or, orpo]
reference_free: false  # True only supports loss types of or, orpo, simpo, sigmoid, hinge, and ipo. When loss_type is or, orpo and simpo, automatically set to True.

# performance
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
sharding: stage3
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true
fp16_opt_level: O2
unified_checkpoint: false
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"