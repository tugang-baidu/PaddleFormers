name: PaddleFormers Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
jobs:
  formers:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@formers')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@formers')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@formers')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@formers') || contains(github.event.issue.title, '@formers')))
    runs-on: paddle-bot
    env:
      PATH: /home/paddle-1/.nvm/versions/node/v20.20.2/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Extract @formers comment and run bot
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          cd /home/paddle-1/
          if [[ "$COMMENT_BODY" == *"@formers"* ]]; then
            python formers_bot.py --prompt "$COMMENT_BODY"
          elif [[ "$REVIEW_BODY" == *"@formers"* ]]; then
            python formers_bot.py --prompt "$REVIEW_BODY"
          elif [[ "$ISSUE_BODY" == *"@formers"* ]] || [[ "$ISSUE_TITLE" == *"@formers"* ]]; then
            python formers_bot.py --prompt "$ISSUE_BODY $ISSUE_TITLE"
          fi 
      - name: Post result to PR/Issue comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ ! -f /tmp/bot_result.md ]; then
            echo "No result file found, skipping comment"
            exit 0
          fi
          
          RESULT=$(cat /tmp/bot_result.md)

          COMMENT_BODY=$(cat <<EOF
          
          ${RESULT}
          
          ---
          *由 [@formers](https://github.com/apps/formers) 自动生成*
          EOF
          )
          
          if [[ "$EVENT_NAME" == "issue_comment" ]] || [[ "$EVENT_NAME" == "issues" ]]; then
            NUMBER=$COMMENT_ISSUE_NUMBER
          else
            NUMBER=$PR_NUMBER
          fi
          
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/$NUMBER/comments" \
            -d "{\"body\": $(echo "$COMMENT_BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"