jobs:
  Lint:
    name: Lint
    on: [pull_request, push]
    runs-on: [self-hosted, ernie-cpu]
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Container
        env:
          work_dir: ${{ github.workspace }}
          python_version: "3.10"
        run: |
          container_name=${TASK}-$(date +%Y%m%d-%H%M%S)
          echo "container_name=${container_name}" >> "$GITHUB_ENV"
          docker_image="iregistry.baidu-int.com/paddlecloud/base-images:paddlecloud-ubuntu20.04-gcc12.2-cuda12.3-cudnn9.0-nccl2.20.3.1-openmpi4.1.5-latest"
          docker run -d -t --name ${container_name} --net=host -v /dev/shm:/dev/shm --shm-size=32G \
            -v $work_dir:/workspace \
            -v /home/.cache/pip:/home/.cache/pip \
            -e BRANCH \
            -e PR_ID \
            -e COMMIT_ID \
            -w /workspace ${docker_image}

      - name: Prepare Code
        env:
          work_dir: ${{ github.workspace }}
        run: |
          docker exec -t ${container_name} /bin/bash -c '
          # 设置统一代理
          export http_proxy=http://your-proxy:port
          export https_proxy=http://your-proxy:port
          export no_proxy=localhost,127.0.0.1,.baidu.com
          
          # 安全下载代码
          cd /workspace
          if [ ! -d "PaddleFormers" ]; then
            echo "Downloading PaddleFormers.tar"
            wget -q https://paddle-qa.bj.bcebos.com/CodeSync/develop/PaddleFormers.tar
            tar xf PaddleFormers.tar && rm -f PaddleFormers.tar
          fi
          
          cd PaddleFormers
          git config --global user.name "PaddleCI"
          git config --global user.email "paddle_ci@example.com"
          
          # 简化 PR 处理
          if [ -n "${PR_ID}" ]; then
            git fetch origin pull/${PR_ID}/head:PR_${PR_ID}
            git checkout PR_${PR_ID}
          fi
          '

      - name: Setup Environment
        run: |
          docker exec -t $container_name /bin/bash -c '
          # 安全设置 Python
          py_path=$(which python${python_version})
          ln -sf "$py_path" /usr/local/bin/python
          
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install --upgrade pip wheel
          cd /workspace/PaddleFormers
          pip install -r requirements.txt
          '

      - name: Run Lint
        run: |
          docker exec -t $container_name /bin/bash -c '
          cd /workspace/PaddleFormers
          make lint
          '
      
      - name: Terminate Container
        if: always()
        run: docker rm -f $container_name 2>/dev/null || true