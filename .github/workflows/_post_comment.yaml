name: Post Analysis Comment

on:
  workflow_run:
    workflows:
      - "Unittest GPU CI"
      - "Model Unittest GPU CI"
      - "CI_ILUVATAR"
      - "Fleet Model Test"
      - "Codestyle Check"
      - "CI_XPU"
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  post-comment:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number and check all workflows done
        id: get_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          token    = os.environ['GITHUB_TOKEN']
          repo     = os.environ['REPO']
          run_id   = os.environ['RUN_ID']
          head_sha = os.environ['HEAD_SHA']
          watched  = {
              "Unittest GPU CI", "Model Unittest GPU CI",
              "CI_ILUVATAR", "Fleet Model Test", "Codestyle Check", "CI_XPU"
          }
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # 获取关联 PR
          run_data = gh_get(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
          )
          prs = run_data.get('pull_requests', [])
          if not prs:
              print("No associated PR, skipping.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("skip=true\n")
              exit(0)

          pr_number = prs[0]['number']

          # 查该 commit 上所有 watched workflow 的状态，每个只取最新一次 run
          runs = gh_get(
              f"https://api.github.com/repos/{repo}/actions/runs"
              f"?head_sha={head_sha}&per_page=100"
          ).get('workflow_runs', [])

          latest = {}
          for r in runs:
              name = r['name']
              if name not in watched:
                  continue
              if name not in latest or r['run_number'] > latest[name]['run_number']:
                  latest[name] = r

          # 1. 没有任何 watched workflow 有记录 → skip
          if not latest:
              print("No watched workflows found for this commit, skipping.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("skip=true\n")
              exit(0)

          # 2. 还有 pending → skip
          pending = [name for name, r in latest.items() if r['status'] != 'completed']
          if pending:
              print(f"Still pending: {pending}, skipping this trigger.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("skip=true\n")
              exit(0)

          # 3. 全部完成但没有失败 → skip
          failed_run_ids = [
              str(r['id']) for r in latest.values()
              if r['conclusion'] == 'failure'
          ]
          if not failed_run_ids:
              print("All watched workflows passed, no comment needed.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("skip=true\n")
              exit(0)

          # 4. 全部完成且有失败 → 触发
          print(f"All done. PR #{pr_number}, failed runs: {failed_run_ids}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("skip=false\n")
              f.write(f"pr_number={pr_number}\n")
              f.write(f"failed_run_ids={' '.join(failed_run_ids)}\n")
          PYEOF

      - name: Download all artifacts
        if: steps.get_pr.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FAILED_RUN_IDS: ${{ steps.get_pr.outputs.failed_run_ids }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          mkdir -p /tmp/artifacts
          for RID in $FAILED_RUN_IDS; do
            echo "Trying to download artifact for run $RID..."
            ARTIFACT_ID=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/runs/${RID}/artifacts" \
              | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for a in data.get('artifacts', []):
              if a['name'] == f'bot-result-{sys.argv[1]}':
                  print(a['id'])
                  break
          " "$RID" 2>/dev/null || true)

            if [ -z "$ARTIFACT_ID" ]; then
              echo "No artifact found for run $RID, skipping."
              continue
            fi

            echo "Downloading artifact $ARTIFACT_ID for run $RID..."
            curl -s -L \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
              -o /tmp/artifacts/bot-result-${RID}.zip

            unzip -q /tmp/artifacts/bot-result-${RID}.zip \
              -d /tmp/artifacts/bot-result-${RID}/ || true

            echo "Downloaded: $(ls /tmp/artifacts/bot-result-${RID}/)"
          done

      - name: Post or update PR comment
        if: steps.get_pr.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.get_pr.outputs.pr_number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          FAILED_RUN_IDS: ${{ steps.get_pr.outputs.failed_run_ids }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, urllib.request

          token          = os.environ['GITHUB_TOKEN']
          repo           = os.environ['REPO']
          pr_number      = os.environ['PR_NUMBER']
          run_id         = os.environ['RUN_ID']
          run_attempt    = os.environ['RUN_ATTEMPT']
          failed_run_ids = os.environ['FAILED_RUN_IDS'].split()
          marker         = "<!-- bot-log-analysis -->"

          # 所有失败 run 的分析结果内容一样（都是全 PR 汇总），取第一个有效的即可
          body = None
          for rid in failed_run_ids:
              files = glob.glob(f"/tmp/artifacts/bot-result-{rid}/bot_result_{rid}-*.md")
              if files:
                  body = open(files[0]).read()
                  print(f"Using result from run {rid}: {files[0]}")
                  break

          if not body:
              body = "⚠️ 未生成分析结果，请手动查看 Action 日志。"

          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"
          comment = (
              f"{marker}\n"
              f"## 🤖 PaddleFormers Bot Log Analysis\n\n"
              f"> Run [`#{run_id}`]({run_url}) · Attempt `{run_attempt}`\n\n"
              f"{body}\n\n"
              f"---\n"
              f"<sub>🔄 每次 Re-run 后自动更新</sub>"
          )

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
          }

          def gh(method, url, payload=None):
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode() if payload else None,
                  headers=headers,
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          base = f"https://api.github.com/repos/{repo}"
          comments = gh("GET", f"{base}/issues/{pr_number}/comments?per_page=100")
          existing_id = next(
              (c["id"] for c in comments if marker in c.get("body", "")), None
          )

          if existing_id:
              res = gh("PATCH", f"{base}/issues/comments/{existing_id}", {"body": comment})
              print(f"Updated: {res.get('html_url')}")
          else:
              res = gh("POST", f"{base}/issues/{pr_number}/comments", {"body": comment})
              print(f"Created: {res.get('html_url')}")
          PYEOF