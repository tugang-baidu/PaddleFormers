  integration-test-a100:
    needs: [check_documents_type, check_skip]
    if: ${{ needs.check_documents_type.outputs.is_md_only == 'false' && needs.check_skip.outputs.skip == 'false' }}
    name: Integration test (A100)
    runs-on:
