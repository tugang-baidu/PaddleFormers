name: Build CI-Docker Images

on:
  # push:
  #   branches: [develop]
  #   paths:
  #     - "requirements*"
  #     - "tests/requirements.txt"
  #     - "setup.py"
  #     - ".github/workflows/build-ci-docker-images.yml"
  # pull_request:
  #   types: [opened, synchronize, reopened]
  #   branches: [develop]
  schedule:
    - cron: "5 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_ID: ${{ github.event.pull_request.number }}
  COMMIT_ID: ${{ github.event.pull_request.head.sha }}
  BRANCH: ${{ github.event.pull_request.base.ref }}
  GITHUB_EVENT_NAME: ${{ github.event_name }}
  TASK: PaddleFormers-CI-${{ github.event.pull_request.number }}-build-image
  image_base: "iregistry.baidu-int.com/paddlecloud/base-images:paddlecloud-ubuntu18.04-gcc8.2-cuda11.8-cudnn8.6-nccl2.15.5"
  no_proxy: "localhost,bj.bcebos.com,su.bcebos.com,bcebos.com,apiin.im.baidu.com,gitee.com,aliyun.com,.baidu.com,.tuna.tsinghua.edu.cn"

jobs:
  build-ci-docker-images:
    name: build-ci-docker-images
    runs-on: [self-hosted, ernie-8gpu]
    outputs:
      run_build: ${{ steps.set_flags.outputs.run_build }}
      run_downstream: ${{ steps.set_flags.outputs.run_downstream }}
      image_name: ${{ steps.set_flags.outputs.image_name }}
  
    steps:
      - name: Run Container
        env:
          work_dir: ${{ github.workspace }}
        run: |
          container_name=${TASK}-$(date +%Y%m%d-%H%M%S)
          echo "container_name=${container_name}" >> ${{ github.env }}
          docker_image="${image_base}-latest"
          docker run -d -t --name ${container_name} --net=host -v /dev/shm:/dev/shm --shm-size=32G \
            -v $work_dir/../../..:$work_dir/../../.. \
            -v $work_dir:/workspace \
            -v /home/.cache/pip:/home/.cache/pip \
            -e BRANCH \
            -e PR_ID \
            -e COMMIT_ID \
            -e work_dir \
            -e no_proxy \
            -w /workspace --runtime=nvidia ${docker_image}

      - name: Download Code
        env:
          work_dir: ${{ github.workspace }}
        run: |
          docker exec -t ${container_name} /bin/bash -c '
          rm -rf * .[^.]*
          echo "Downloading PaddleFormers.tar"
          wget -q --no-proxy  https://paddle-qa.bj.bcebos.com/CodeSync/develop/PaddleFormers.tar --no-check-certificate
          echo "Extracting PaddleFormers.tar"
          tar xf PaddleFormers.tar && rm -rf PaddleFormers.tar
          source $work_dir/../../../proxy
          cd PaddleFormers
          git config --global user.name "PaddleCI"
          git config --global user.email "paddle_ci@example.com"
          git pull
          git submodule update --init --recursive --force
          if [ -n "${PR_ID}" ]; then
            git fetch origin pull/${PR_ID}/head
            git checkout -b PR_${PR_ID} FETCH_HEAD
            git remote add upstream https://github.com/PaddlePaddle/PaddleFormers.git
            git fetch upstream ${BRANCH}
            git merge ${BRANCH} --no-edit
            git diff --numstat ${BRANCH} -- | awk "{print \$NF}"
          else
            echo "Not in a pull_request event. Skipping PR-specific operations."
          fi
          git log --pretty=oneline -10
          unset http_proxy && unset https_proxy
          '

      - name: Set Flags
        id: set_flags
        env:
          work_dir: ${{ github.workspace }}
        run: |
          run_build=false
          run_downstream=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            run_build=true
            run_downstream=false
            image_name="${image_base}-latest"
          elif [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            run_build=true
            run_downstream=true
            image_name="${image_base}-schedule-$(date +%Y%m%d-%H%M%S)"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            cd PaddleFormers
            target_lists_for_pr=(
                "requirements"
                "tests/requirements.txt"
                "setup.py"
                ".github/workflows/build-ci-docker-images.yml"
            )
            for file_name in `git diff --numstat ${BRANCH} -- |awk '{print $NF}'`;do
              for ((i=0; i<${#target_lists_for_pr[@]}; i++)); do
                arr_file_name=(${file_name//// })
                dir1=${arr_file_name[0]}
                dir2=${arr_file_name[1]}
                dir3=${arr_file_name[2]}
                dir4=${arr_file_name[3]}
                file_item=$dir1/$dir2/$dir3/$dir4
                if [ ! -f "${file_name}" ]; then
                    continue
                fi
                if [[ "${file_item}" == *"${target_lists_for_pr[i]}"* ]];then
                    run_build=true
                    run_downstream=true
                    image_name="${image_base}-${PR_ID}-${COMMIT_ID}"
                    break 2
                fi
              done
            done
          fi
          echo "run_build=${run_build}" >> "$GITHUB_ENV"
          echo "run_downstream=${run_downstream}" >> "$GITHUB_ENV"
          echo "run_downstream=${run_downstream}" >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_ENV"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

      - name: Write Dockerfile Inline
        run: |
          cat <<EOF > Dockerfile
          FROM iregistry.baidu-int.com/paddlecloud/base-images:paddlecloud-ubuntu18.04-gcc8.2-cuda11.8-cudnn8.6-nccl2.15.5-libsndfile
          RUN unlink /usr/bin/python3 && ln -sf python3.10 /usr/bin/python3
          RUN rm -rf /etc/pip.conf
          RUN python -m pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          RUN python -m pip install bce-python-sdk==0.8.74
          COPY PaddleFormers/ /tmp/paddleformers/
          WORKDIR /tmp/paddleformers
          RUN python -m pip install -r requirements.txt
          RUN python -m pip install -r requirements-dev.txt
          RUN python -m pip install -r tests/requirements.txt
          RUN python setup.py bdist_wheel
          RUN python -m pip install dist/*.whl
          WORKDIR /
          RUN rm -rf /tmp/paddleformers
          CMD ["python3"]
          EOF
      
      - name: Build Docker Image
        run: |
          if [[ "${run_build}" == "false" ]]; then
            echo "No need to build docker image"
          else
            docker build --network host -t ${image_name} .
          fi
      
      - name: Terminate And Delete the Container
        if: always()
        run: |
          docker rm -f ${container_name} 2>/dev/null || true

  test-ci-docker-images:
    name: test-ci-docker-images
    needs: build-ci-docker-images
    uses: ./.github/workflows/unittest-gpu.yml
    with:
      run_downstream: ${{ needs.build-ci-docker-images.outputs.run_downstream }}
      image_name: ${{ needs.build-ci-docker-images.outputs.image_name }}

  clean-ci-image:
    name: clean-ci-image
    needs: [build-ci-docker-images, test-ci-docker-images]
    runs-on: [self-hosted, ernie-8gpu]
    steps:
      - name: Remove CI Image
        env:
          run_downstream: ${{ needs.build-ci-docker-images.outputs.run_downstream }}
          image_name: ${{ needs.build-ci-docker-images.outputs.image_name }}
        run: |
          if [[ "${run_downstream}" == "false" ]]; then
            echo "Not in a pull_request or test_build event. Skipping..."
          else
            CONTAINERS=$(docker ps -a --filter "ancestor=$image_name" --format "{{.ID}}")
            if [ -z "$CONTAINERS" ]; then
                echo "$image_name is not using by any container, deleting..."
                if docker image inspect "$image_name" > /dev/null 2>&1; then
                    docker rmi "$image_name"
                else
                    echo "$image_name not found, maybe in other runners"
                fi
            else
                echo "$image_name is using by containers:"
                echo "$CONTAINERS"
            fi
          fi
          # 安全删除悬空镜像（无悬空镜像时跳过）
          docker images -f "dangling=true" -q | xargs -r docker rmi -f