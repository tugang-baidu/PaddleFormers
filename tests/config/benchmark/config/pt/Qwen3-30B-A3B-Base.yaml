## data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./data/pt/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/pt/eval.jsonl
eval_dataset_prob: "1.0"

# dataset_type: "pretrain"
# input_dir: "1.0 xuxinyi/PaddleFormers/data/pre-training/llama_openwebtext_100k"
# split: "998,1,1"

eval_iters: 10

max_seq_len: 8192
num_samples_each_epoch: 6000000
packing: true
mix_strategy: concat

truncate_packing: true
dataloader_shuffle: false
dataloader_num_workers: 24
prefetch_factor: 24

### model
model_name_or_path: /root/paddlejob/share-storage/gpfs/system-public/efficient_benchmark/huggingface/Qwen/Qwen3-30B-A3B
_attn_implementation: flashmask
use_qk_norm: true

### finetuning
# base
stage: PT
fine_tuning: full
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 1
per_device_train_batch_size: 2
num_train_epochs: 5
max_steps: 30
eval_steps: 100
evaluation_strategy: steps
save_steps: 10000
save_total_limit: 1
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 64
logging_dir: ./log_32cards
output_dir: ./checkpoints/qwen3_hf_30b_pretrain_ckpts_parallel
disable_tqdm: true
eval_accumulation_steps: 16

# train
warmup_steps: 20
learning_rate: 1.0e-5

# performance
tensor_model_parallel_size: 1
sequence_parallel: false
pipeline_model_parallel_size: 1
use_expert_parallel: true
expert_model_parallel_size: 8

# recompute
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1

using_sonic_moe: true

# sharding
sharding: stage1
split_param: true
stage1_overlap: true
sd_release_grads: true

apply_rope_fusion: true
moe_grouped_gemm: true
moe_ep_barrier: false
moe_router_fusion: true
moe_router_force_load_balancing: false

# pp
pp_delay_scale_loss: true
overlap_p2p_comm: true
variable_seq_lengths: true
best_unbalanced_scheduler: true

tp_delay_scale_loss: True

optim: adamw
bf16: true
fp16_opt_level: O2
amp_master_grad: true

save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"

tensorwise_offload_optimizer: true

benchmark: true