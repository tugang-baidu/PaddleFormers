# stage
stage: ernie_pretrain

# data
dataset_type: pretrain
input_dir: "1.0 /root/efficient_benchmark/dataset/eb45_industrycorpus2_94k/eb45_industrycorpus2_94k"
split: "998,1,1"
data_load_process_num: 40
max_seq_len: 8192
base_seq_length: 8192
dataloader_num_workers: 8
prefetch_factor: 32
ignore_data_skip: 0

# model
model_name_or_path: /root/efficient_benchmark/huggingface/ERNIE-4.5-300B-A47B/
tokenizer_name_or_path: PaddleFormers/examples/experiments/ernie_pretrain/ernie/src/tokenizers/tokenizer_model
moe_router_bias_update_rate: 0.001
moe_with_send_router_loss: False
moe_group: ep
use_moe: true

# train
output_dir: ./output/eb45_300b_pt
num_consecutive: 32
enable_global_training_logs: False
global_logging_interval: 1
enable_mtp_magic_send: True
use_sp_callback: true
moe_gate_lr_ratio: 0.01
do_train: True
overwrite_output_dir: 1
disable_tqdm: 1
logging_steps: 1
eval_steps: 1000
eval_iters: -1
save_steps: 100
max_steps: 10
adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1e-8
learning_rate: 2.2e-4
min_lr: 2.2e-5
gradient_accumulation_steps: 16
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
lr_scheduler: wsd:231084
decay_function: 1-sqrt
max_grad_norm: 1.0
use_async_save: True
weight_decay: 0.1
warmup_steps: 200
save_total_limit: 5
bf16: True
fp16_opt_level: "O2"
use_fp8: False
scale_loss: 4096
seed: 666
use_train_part_sharding: 1
pre_alloc_memory: 60
tensorwise_offload_optimizer: True
pipeline_model_parallel_size: 8
tensor_model_parallel_size: 1
virtual_pipeline_model_parallel_size: 1
data_parallel_size: 1
use_expert_parallel: True
expert_model_parallel_size: 8
sharding: "stage1"
sharding_parallel_size: 8
amp_master_grad: 1
global_batch_size: 128

# pipeline_parallel_config
overlap_p2p_comm: true
best_unbalanced_scheduler: true

# sharding_parallel_config
split_param: true
sharding_comm_buffer_size_MB: 2048

# tensor_parallel_config
tp_sync_param: true
sync_grad: true
tp_sync_moment: true
hybrid_parallel_topo_order: sharding_first
skip_profile_timer: True
shuffle_consecutive: True
load_sharded_model: True
save_sharded_model: True
ignore_load_lr_and_optim: False
metrics_output_path: ./output/paddle_distributed_logs/
log_global_grad_norm: True
enable_optimizer_timer: False
gc_interval: 100000

ernie_model_config:
    num_nextn_predict_layers: 1
    use_ep_comm_overlap: false
    use_combine_before_a2a: true
    use_rms_qkv_recompute: true

    moe_logging: True
    moe_use_aux_free: true
    use_recompute: false
    use_fp8_mlp: true
    use_fp8_fuse_node: true
    fp8_mem_configs:
        shared_expert: false
        recompute_fwd_gate_up: [4, 5, 6, 7, 8, 10, 11, 12, 13, 16, 17, 18]
        dequant_input: true
    fp8_fused_ops_configs:
        stack_quant: true
        swiglu_probs_bwd: true
        split_group_gemm: false
        spaq: true
        transpose_split_quant: true

    moe_gate: top2_fused

moe_deep_gemm: false

