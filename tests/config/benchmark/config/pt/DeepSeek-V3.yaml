### stage
stage: dsv3_pretrain

### data
input_dir: /root/efficient_benchmark/dataset/DeepSeek-V3
max_seq_len: 8192
dataloader_num_workers: 8
ignore_data_skip: 0

### model
model_name_or_path: ./config/
tokenizer_name_or_path: /root/efficient_benchmark/huggingface/DeepSeek-V3
use_expert_parallel: true

### train
output_dir: ./checkpoints/pretrain_ckpts
do_train: true
do_eval: true
do_predict: false
disable_tqdm: true
logging_steps: 1
eval_steps: 1000
save_steps: 5000
max_steps: 10
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
global_batch_size: 32
learning_rate: 0.000022
min_lr: 0.00000073333
warmup_steps: 30
warmup_ratio: 0.01
weight_decay: 0.01
max_grad_norm: 1.0
save_total_limit: 2
continue_training: 0

### precision
bf16: true
fp16_opt_level: O2
amp_master_grad: true

### parallel
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 4
virtual_pipeline_model_parallel_size: 1
sharding: stage1
sharding_parallel_size: 2
expert_model_parallel_size: 2
sequence_parallel: 0
data_parallel_size: 1

### pipeline_parallel_config
use_dualpipev: true
overlap_p2p_comm: true

### sharding_parallel_config
split_param: true
sharding_comm_buffer_size_MB: 2048

### model config
num_nextn_predict_layers: 1
moe_router_force_load_balancing: true
hidden_dropout_prob: 0.1
attention_probs_dropout_prob: 0.1
apply_rope_fusion: true

### memory & performance
unified_checkpoint: true
save_sharded_model: false
load_sharded_model: false
unified_checkpoint_config: ignore_merge_optimizer
tensorwise_offload_optimizer: true
reorder_pipeline_priority: true
pre_alloc_memory: 45
distributed_dataloader: 1
skip_profile_timer: false

### benchmark config
metrics_output_path: ./output/paddle_distributed_logs/

moe_deep_gemm: false