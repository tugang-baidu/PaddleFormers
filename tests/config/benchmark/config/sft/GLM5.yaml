### data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ../data/sft/train_Qwen_gsm8k.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ../data/sft/test_gsm8k.jsonl
eval_dataset_prob: "1.0"
packing: true
truncate_packing: true
max_seq_len: 8192
mix_strategy: concat
# distributed_dataloader: 1
# should_load_dataset: true


### model
model_name_or_path: ../models/GLM-5 #
attn_impl: flashmask

### finetuning
# base
stage: PT
# lora: true
# lora_rank: 32
fine_tuning: full
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 1
per_device_train_batch_size: 2
num_train_epochs: 1
max_steps: 1
eval_iters: 10cd
eval_steps: 100
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
# gradient_accumulation_steps: 4
gradient_accumulation_steps: 8
logging_dir: ./glm_full_sft_log
output_dir: ./checkpoints/glm45-sft-test
disable_tqdm: false
eval_accumulation_steps: 16

# args
router_aux_loss_coef: 0.001

# train
warmup_steps: 20
learning_rate: 1.0e-5

# parallel
tensor_model_parallel_size: 2
sequence_parallel: true
use_expert_parallel: true
expert_model_parallel_size: 4
pipeline_model_parallel_size: 2
#virtual_pipeline_model_parallel_size: 12
num_empty_layers_add_in_head: 0
num_empty_layers_add_in_tail: 2

# performance
# recompute_granularity: full
# recompute_method: first_n
# recompute_num_layers: 10

recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1


moe_grouped_gemm: false
moe_deep_gemm: false

# apply_rope_fusion: true
fuse_rms_norm: true
moe_router_force_load_balancing: false

sequence_parallel: true
use_expert_parallel: true

# sharding
split_param: true
sharding: stage1
# stage1_overlap: true
# fuse_optimizer_states: true

# pp
pp_delay_scale_loss: true
overlap_p2p_comm: true
variable_seq_lengths: true
best_unbalanced_scheduler: true
pp_release_grads: true

tp_delay_scale_loss: True

amp_master_grad: true
bf16: true
fp16_opt_level: O2

save_checkpoint_format: flex_checkpoint
load_checkpoint_format: flex_checkpoint
save_to_hf: true
continue_training: false
dataloader_shuffle: false
benchmark: true

dataloader_num_workers: 24
prefetch_factor: 24

fuse_attention_qkv: true
fuse_attention_ffn: true
# loss_subbatch_sequence_length: 256

tensorwise_offload_optimizer: true
skip_profile_timer: false
load_via_cpu: true
fp32_residual_connection: false

# profile: true
# profile_step_start: 1
# profile_step_end: 2
# num_hidden_layers: 4
template_backend: custom
template: glm_moe_dsa

multi_latent_attention: true
use_qk_norm: true