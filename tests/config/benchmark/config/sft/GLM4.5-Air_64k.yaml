train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: /root/efficient_benchmark/dataset/data_sft_10w/sft_data_10w.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: /root/efficient_benchmark/dataset/data_sft_10w/sft_data_10w.jsonl
eval_dataset_prob: "1.0"

max_seq_len: 65536
packing: true
use_template: false
random_shuffle: true
mix_strategy: concat
truncate_packing: false
padding_free: true

### model
model_name_or_path: /root/efficient_benchmark/huggingface/GLM-4.5-Air
_attn_implementation: flashmask

### finetuning
# base
stage: SFT
fine_tuning: full
seed: 23
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: 10
eval_iters: 1000
eval_steps: 1000
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 64
logging_dir: ./vdl_log
output_dir: /root/ckpt
disable_tqdm: true
eval_accumulation_steps: 16

# train
warmup_steps: 20
learning_rate: 1.0e-5

# performance
context_parallel_size: 1
tensor_model_parallel_size: 8
expert_model_parallel_size: 8
pipeline_model_parallel_size: 4
num_empty_layers_add_in_head: 0
num_empty_layers_add_in_tail: 2

# performance
recompute_granularity: full
recompute_method: first_n
recompute_num_layers: 10

moe_expert_fusion: true
moe_deep_gemm: false

apply_rope_fusion: true
moe_router_force_load_balancing: false

sequence_parallel: true
use_expert_parallel: true


split_param: true
sharding: stage1
stage1_overlap: true

# pp
overlap_p2p_comm: true
variable_seq_lengths: true
best_unbalanced_scheduler: true
pp_release_grads: true


amp_master_grad: true
bf16: true
fp16_opt_level: O2
fa_version: 3

save_checkpoint_format: flex_checkpoint
load_checkpoint_format: flex_checkpoint
continue_training: true
dataloader_shuffle: false

dataloader_num_workers: 24
prefetch_factor: 24

fp32_residual_connection: false
tensorwise_offload_optimizer: true
