### data
train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: /root/paddlejob/share-storage/gpfs/system-public/efficient_benchmark/dataset/data_sft_10w/sft_data_10w.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: /root/paddlejob/share-storage/gpfs/system-public/efficient_benchmark/dataset/data_sft_10w/sft_data_10w.jsonl
eval_dataset_prob: "1.0"

eval_iters: 10

packing: true
max_seq_len: 65536
mix_strategy: concat
greedy_intokens: false
truncate_packing: false
padding_free: true

dataloader_shuffle: false
# random_shuffle: false
dataloader_num_workers: 24
prefetch_factor: 24

### model
model_name_or_path: /root/paddlejob/share-storage/gpfs/system-public/efficient_benchmark/huggingface/Qwen/Qwen3-30B-A3B
_attn_implementation: flashmask
use_qk_norm: true

### finetuning
# base
stage: SFT
fine_tuning: full
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: 20000000
eval_steps: 100000000
evaluation_strategy: steps
save_steps: 10000000
# save_hf_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 64
disable_tqdm: true
eval_accumulation_steps: 1
logging_dir: ./vdl_log
output_dir: ./checkpoints/paddlefleet-qwen3moe-pt
continue_training: true

# train
warmup_steps: 20
learning_rate: 1.0e-5
lr_scheduler_type: constant

# parallel
context_parallel_size: 4
tensor_model_parallel_size: 2
sequence_parallel: true
pipeline_model_parallel_size: 2
use_expert_parallel: true
expert_model_parallel_size: 8

# recompute
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
recompute_modules: 
  flash_attn: 0

# sharding
sharding: stage1
split_param: true
stage1_overlap: true

apply_rope_fusion: true
moe_deep_gemm: true
moe_grouped_gemm: true
moe_router_fusion: true
moe_router_force_load_balancing: false
router_aux_loss_coef: 1e-3

# pp
pp_delay_scale_loss: true
overlap_p2p_comm: true
variable_seq_lengths: true
pp_release_grads: true
sd_release_grads: true
best_unbalanced_scheduler: true

tp_delay_scale_loss: True

# fp8: "e4m3"

amp_master_grad: true
bf16: true
fp16_opt_level: O2

save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"

benchmark: true

tensorwise_offload_optimizer: false