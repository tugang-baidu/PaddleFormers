### data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: /workspace/PaddleFormers/tests/fixtures/dummy/sft-vl/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: /workspace/PaddleFormers/tests/fixtures/dummy/sft-vl/train.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 8192
packing: false
mix_strategy: concat
template_backend: custom
template: qwen3_vl
### model
model_name_or_path: /root/.cache/qwen3vl/tiny-random-qwen3vlmoev2
_attn_implementation: flashmask
### finetuning
# base
stage: VL-SFT
fine_tuning: full
seed: 23
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: 10
eval_steps: 10
evaluation_strategy: steps
save_steps: 10
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 8
logging_dir: ./vdl_log
output_dir: /workspace/checkpoints/qwen3vl-moe
disable_tqdm: true
eval_accumulation_steps: 16
# train
warmup_steps: 20
learning_rate: 1.0e-4
# args
router_aux_loss_coef: 0.001
# parallel
tensor_model_parallel_size: 4
pipeline_model_parallel_size: 1
sequence_parallel: false
sharding: stage1
# performance
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
# fuse_attention_qkv: true
# fuse_attention_ffn: true
moe_grouped_gemm: false
# moe_deep_gemm: false
apply_rope_fusion: False
# fuse_rms_norm: true
moe_token_dispatcher_type: alltoall
# moe_router_force_load_balancing: true

# sharding
split_param: true
sharding: stage1
# stage1_overlap: true
# fuse_optimizer_states: true

# pp
overlap_p2p_comm: true
variable_seq_lengths: true
best_unbalanced_scheduler: true
# pp_release_grads: true

# tp
tp_sync_param: true
sync_grad: true
amp_master_grad: true
bf16: true
fp16_opt_level: O2
# fp8: e4m3

save_checkpoint_format: flex_checkpoint
load_checkpoint_format: flex_checkpoint
continue_training: True
dataloader_shuffle: false
report_to: none
dataloader_num_workers: 4
prefetch_factor: 8
# profile: true
# profile_step_start: 1
# profile_step_end: 2
# num_hidden_layers: 38
freeze_config: freeze_vision freeze_aligner
tensorwise_offload_optimizer: true
high_precision_rope: true