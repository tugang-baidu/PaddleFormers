### data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./dpo_train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./dpo_eval.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 2048
packing: true
mix_strategy: concat

### model
model_name_or_path: zai-org/GLM-4.5-Air-Base/
#_attn_implementation: sdpa
_attn_implementation: flashmask

### finetuning
# base
stage: DPO
# params_dtype: bfloat16
fine_tuning: lora
seed: 23
bf16: true
fp16_opt_level: O2
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
#use_attn_mask_startend_row_indices: false
use_attn_mask_startend_row_indices: true
#tensor_model_parallel_size: 2
max_steps: 10
eval_steps: 100000
evaluation_strategy: steps
#pipeline_model_parallel_size: 1
continue_training: true
save_steps: 100000
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 4
logging_dir: ./vdl_log
output_dir: ./checkpoints/glm4_hf_dpo_lora_ckpts
disable_tqdm: true
eval_accumulation_steps: 16
tensor_model_parallel_size: 4
pipeline_model_parallel_size: 2
expert_model_parallel_size: 4
use_expert_parallel: true
sequence_parallel: true

moe_group: mp
moe_token_dispatcher_type: "deepep"
gated_linear_unit: true
hidden_dropout_prob: 0.0
# attention_dropout: 0.0
recompute_granularity: ""
amp_master_grad: true

# train
warmup_steps: 20
learning_rate: 1.0e-5
save_checkpoint_format: flex_checkpoint
load_checkpoint_format: flex_checkpoint
moe_router_force_load_balancing: false
clear_every_step_cache: true
partial_send_recv: false
#use_cpu_initialization: true

num_hidden_layers: 3
num_empty_layers_add_in_tail: 1

router_aux_loss_coef: 0.001