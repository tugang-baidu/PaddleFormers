# data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./data/pre-training/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/pre-training/eval.jsonl
eval_dataset_prob: "1.0"

eval_iters: 10

max_seq_len: 4096
num_samples_each_epoch: 6000000
packing: true
mix_strategy: concat


truncate_packing: true
dataloader_shuffle: false
dataloader_num_workers: 4
prefetch_factor: 24


### model
model_name_or_path: ./Qwen3-30B-A3B
gated_linear_unit: true
_attn_implementation: flashmask
num_hidden_layers: 4
use_qk_norm: true

### finetuning
# base
stage: PT
fine_tuning: full
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 5
max_steps: 10
eval_steps: 10000
evaluation_strategy: steps
save_steps: 10000
save_total_limit: 1
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 1
disable_tqdm: true
eval_accumulation_steps: 1
output_dir: ./checkpoints/qwen3-30b-a3b-pt
continue_training: false

# train
warmup_steps: 10
learning_rate: 1.0e-5


# recompute
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1

# performance
apply_rope_fusion: true
moe_router_fusion: false
moe_router_force_load_balancing: true
moe_grouped_gemm: true

sharding: "stage1"
split_param: true
stage1_overlap: true
sd_release_grads: true
tensor_model_parallel_size: 4
sequence_parallel: true
pipeline_model_parallel_size: 1
use_expert_parallel: true
expert_model_parallel_size: 8


tp_delay_scale_loss: True

optim: adamw
bf16: true
fp16_opt_level: O2
amp_master_grad: true


fuse_swiglu: true
# fuse_linear: true
# use_paddlefleet: true

# unified_checkpoint: false
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"

router_aux_loss_coef: 0.0