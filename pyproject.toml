[tool.isort]
profile = 'black'
known_third_party = ["paddle"]
skip = ['paddleformers/transformers/__init__.py']

[tool.black]
line-length = 119
target_version = ['py35', 'py36', 'py37', 'py38', 'py39', 'py310']

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q "
pythonpath = ["."]
testpaths = [
    "tests/data",
    "tests/dataset",
    "tests/generation",
    "tests/mergekit",
    "tests/nn",
    "tests/peft",
    "tests/trainer",
    "tests/transformers",
    "tests/utils",
    "tests/ai_edited_test/cli",
    "tests/ai_edited_test/data",
    "tests/ai_edited_test/datasets",
    "tests/ai_edited_test/nn",
    "tests/ai_edited_test/peft",
    "tests/ai_edited_test/quantization",
    "tests/ai_edited_test/trainer",
    "tests/ai_edited_test/transformers",
    "tests/ai_edited_test/utils",
]
python_files = [
    "test.py",
    "test_*.py"
]
filterwarnings = [
    "ignore::UserWarning",
    'ignore::DeprecationWarning',
]
